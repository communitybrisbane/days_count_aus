<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1A3C2E" />
  <title>Offline — days-count</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #1A3C2E;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      -webkit-overflow-scrolling: none;
      overscroll-behavior: none;
      touch-action: none;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1A3C2E 0%, #2D6B4F 50%, #1A3C2E 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-top: max(2rem, env(safe-area-inset-top, 0px));
      padding-bottom: max(2rem, env(safe-area-inset-bottom, 0px));
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
      border-radius: 20px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.6;
      max-width: 280px;
    }
    .wifi-icon {
      margin-bottom: 1rem;
      opacity: 0.3;
    }
    button {
      margin-top: 2rem;
      padding: 0.875rem 2.5rem;
      background: #FF6D00;
      color: #fff;
      border: none;
      border-radius: 1rem;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <svg class="wifi-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1" y1="1" x2="23" y2="23" />
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
    <line x1="12" y1="20" x2="12.01" y2="20" />
  </svg>
  <img src="/icons/icon-192x192.png" alt="days-count" class="icon" />
  <h1>You're Offline</h1>
  <p>days-count needs an internet connection to work. Please check your connection and try again.</p>
  <button onclick="location.reload()">Retry</button>
</body>
</html>
