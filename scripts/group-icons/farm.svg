<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="100" fill="#A0522D"/>
  <!-- Wheat stalks -->
  <line x1="80" y1="150" x2="80" y2="65" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="150" x2="100" y2="55" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="150" x2="120" y2="65" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Left wheat grains -->
  <ellipse cx="76" cy="68" rx="5" ry="10" fill="white" transform="rotate(-15 76 68)"/>
  <ellipse cx="73" cy="82" rx="5" ry="9" fill="white" opacity="0.7" transform="rotate(-20 73 82)"/>
  <ellipse cx="84" cy="75" rx="5" ry="9" fill="white" opacity="0.7" transform="rotate(15 84 75)"/>
  <!-- Center wheat grains -->
  <ellipse cx="96" cy="58" rx="5" ry="10" fill="white" transform="rotate(-15 96 58)"/>
  <ellipse cx="93" cy="72" rx="5" ry="9" fill="white" opacity="0.7" transform="rotate(-20 93 72)"/>
  <ellipse cx="104" cy="62" rx="5" ry="10" fill="white" transform="rotate(15 104 62)"/>
  <ellipse cx="107" cy="76" rx="5" ry="9" fill="white" opacity="0.7" transform="rotate(20 107 76)"/>
  <!-- Right wheat grains -->
  <ellipse cx="116" cy="68" rx="5" ry="10" fill="white" transform="rotate(-15 116 68)"/>
  <ellipse cx="124" cy="75" rx="5" ry="9" fill="white" opacity="0.7" transform="rotate(15 124 75)"/>
  <ellipse cx="127" cy="88" rx="5" ry="9" fill="white" opacity="0.7" transform="rotate(20 127 88)"/>
  <!-- Ground line -->
  <line x1="50" y1="150" x2="150" y2="150" stroke="white" stroke-width="2" opacity="0.3"/>
</svg>
