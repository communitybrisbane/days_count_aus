<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="100" fill="#D63031"/>
  <!-- Lantern body -->
  <ellipse cx="100" cy="95" rx="32" ry="42" fill="white"/>
  <!-- Top cap -->
  <rect x="85" y="50" width="30" height="8" rx="4" fill="white"/>
  <!-- String -->
  <line x1="100" y1="42" x2="100" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Horizontal bands -->
  <ellipse cx="100" cy="80" rx="30" ry="3" fill="#D63031" opacity="0.15"/>
  <ellipse cx="100" cy="95" rx="32" ry="3" fill="#D63031" opacity="0.15"/>
  <ellipse cx="100" cy="110" rx="30" ry="3" fill="#D63031" opacity="0.15"/>
  <!-- Bottom cap -->
  <rect x="88" y="135" width="24" height="6" rx="3" fill="white"/>
  <!-- Tassel -->
  <line x1="96" y1="141" x2="96" y2="155" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="141" x2="100" y2="158" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="104" y1="141" x2="104" y2="155" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
