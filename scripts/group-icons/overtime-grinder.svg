<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="100" fill="#34495E"/>
  <!-- Laptop -->
  <rect x="50" y="75" width="100" height="60" rx="6" fill="white"/>
  <rect x="56" y="81" width="88" height="48" rx="3" fill="#34495E" opacity="0.15"/>
  <!-- Screen glow lines -->
  <line x1="68" y1="95" x2="110" y2="95" stroke="#34495E" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="68" y1="105" x2="100" y2="105" stroke="#34495E" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="68" y1="115" x2="90" y2="115" stroke="#34495E" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <!-- Keyboard base -->
  <path d="M40 135 L50 135 L50 135 L150 135 L160 135 L160 142 Q160 148 154 148 L46 148 Q40 148 40 142 Z" fill="white"/>
  <!-- Moon = late night -->
  <circle cx="150" cy="48" r="16" fill="white"/>
  <circle cx="158" cy="42" r="13" fill="#34495E"/>
  <!-- Zzz -->
  <text x="60" y="62" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.7">Z</text>
  <text x="45" y="50" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" opacity="0.5">z</text>
  <text x="35" y="40" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" opacity="0.3">z</text>
</svg>
