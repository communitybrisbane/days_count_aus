<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="100" fill="#00B894"/>
  <!-- Head -->
  <circle cx="118" cy="45" r="15" fill="white"/>
  <!-- Torso (leaning forward) -->
  <line x1="112" y1="58" x2="95" y2="100" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Front arm (bent, pumping forward) -->
  <line x1="108" y1="72" x2="130" y2="60" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="130" y1="60" x2="138" y2="75" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Back arm (bent, swinging back) -->
  <line x1="105" y1="78" x2="80" y2="85" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="80" y1="85" x2="72" y2="72" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Front leg (extended forward) -->
  <line x1="95" y1="100" x2="125" y2="125" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="125" y1="125" x2="145" y2="118" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Back leg (kicking back) -->
  <line x1="95" y1="100" x2="68" y2="130" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="68" y1="130" x2="55" y2="145" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Speed lines -->
  <line x1="38" y1="65" x2="58" y2="65" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="32" y1="82" x2="55" y2="82" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="35" y1="99" x2="52" y2="99" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
</svg>
